# Configuration Apache pour myapp.mykaypa.com
# Laravel KAYPA Application

# Redirection HTTP vers HTTPS
<VirtualHost *:80>
    ServerName myapp.mykaypa.com
    ServerAlias www.myapp.mykaypa.com

    # Rediriger tout le trafic HTTP vers HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/myapp.mykaypa.com-error.log
    CustomLog ${APACHE_LOG_DIR}/myapp.mykaypa.com-access.log combined
</VirtualHost>

# Configuration HTTPS
<VirtualHost *:443>
    ServerName myapp.mykaypa.com
    ServerAlias www.myapp.mykaypa.com
    ServerAdmin admin@mykaypa.com

    # Racine du projet Laravel (dossier public)
    DocumentRoot /var/www/kaypaversion2/public

    <Directory /var/www/kaypaversion2/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Laravel Pretty URLs
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            # Rediriger les requêtes vers index.php
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php/$1 [L]
        </IfModule>
    </Directory>

    # Sécurité: Empêcher l'accès aux fichiers sensibles
    <DirectoryMatch "/\.git">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "/(storage|bootstrap/cache)">
        Require all denied
    </DirectoryMatch>

    # Configuration SSL
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/myapp.mykaypa.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/myapp.mykaypa.com/privkey.pem

    # Paramètres SSL modernes et sécurisés
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # HSTS (Strict Transport Security)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    # Autres headers de sécurité
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/myapp.mykaypa.com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/myapp.mykaypa.com-ssl-access.log combined

    # PHP Configuration (optionnel)
    <IfModule mod_php.c>
        php_value upload_max_filesize 50M
        php_value post_max_size 50M
        php_value memory_limit 256M
        php_value max_execution_time 300
    </IfModule>
</VirtualHost>

# Configuration SSL supplémentaire globale
<IfModule mod_ssl.c>
    SSLUseStapling on
    SSLStaplingCache "shmcb:logs/stapling-cache(150000)"
</IfModule>
